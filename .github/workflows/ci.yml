# ===========================================================================
# VMCR GitHub Actions - CI
# ===========================================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# 强制使用 Node 24, 避免 2026-09-16 后 Node 20 失效
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BUILD_TYPE: Release

jobs:
  # ---------------------------------------------------------------------
  # 1. 主机侧编译 (无 NDK) - 验证代码可编译
  # ---------------------------------------------------------------------
  host-build:
    name: Host Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libvulkan-dev mesa-vulkan-drivers \
            glslang-tools spirv-tools \
            g++

      - name: Configure
        run: |
          cmake -G Ninja -S . -B build/host \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DVMCR_ENABLE_LOADER=OFF \
            -DVMCR_ENABLE_JNI=OFF \
            -DVMCR_ENABLE_UNIT_TEST=OFF

      - name: Build
        run: cmake --build build/host --parallel

  # ---------------------------------------------------------------------
  # 2. NDK 交叉编译 (arm64-v8a) - 验证 Android 端编译
  # ---------------------------------------------------------------------
  android-build:
    name: Android NDK Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK r27
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d
          add-to-path: false

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y glslang-tools spirv-tools ninja-build

      - name: Configure
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -G Ninja -S . -B build/arm64 \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-ndk-aarch64.cmake \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DANDROID_ABI=arm64-v8a \
            -DVMCR_RENDER_TIER=auto

      - name: Build
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cmake --build build/arm64 --parallel

      - name: Collect artifacts
        run: |
          mkdir -p out/arm64-v8a
          find build/arm64 -name "*.so" -exec cp {} out/arm64-v8a/ \; 2>/dev/null || true
          ls -la out/arm64-v8a/ 2>/dev/null || true

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vmcr-arm64-v8a
          path: out/arm64-v8a/
          if-no-files-found: warn
